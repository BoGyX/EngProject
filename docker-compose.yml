services:
  db:
    image: postgres:15-alpine
    container_name: english_learning_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./englishDiplom.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - english_learning_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: english_learning_api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      PORT: 8000
      GIN_MODE: ${GIN_MODE:-release}
      MOODLE_ENABLED: ${MOODLE_ENABLED}
      MOODLE_TEST_MODE: ${MOODLE_TEST_MODE}
      MOODLE_BASE_URL: ${MOODLE_BASE_URL}
      MOODLE_TOKEN: ${MOODLE_TOKEN}
      MOODLE_SERVICE: ${MOODLE_SERVICE}
      MOODLE_AUTO_CREATE: ${MOODLE_AUTO_CREATE}
      MOODLE_ONLY_AUTH: ${MOODLE_ONLY_AUTH}
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/root/uploads
    networks:
      - english_learning_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: english_learning_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      PORT: 80
      VITE_API_URL: /api
      BACKEND_ORIGIN: http://backend:8000
      FORCE_HTTPS_REDIRECT: ${FORCE_HTTPS_REDIRECT:-false}
      ALLOW_IFRAME_EMBED: ${ALLOW_IFRAME_EMBED:-true}
      IFRAME_ANCESTORS: ${IFRAME_ANCESTORS:-https://lms.25-12.ru}
    depends_on:
      - backend
    networks:
      - english_learning_network

  adminer:
    image: adminer:latest
    container_name: english_learning_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - english_learning_network

volumes:
  postgres_data_v2:

networks:
  english_learning_network:
    driver: bridge
